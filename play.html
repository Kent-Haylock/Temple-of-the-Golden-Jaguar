<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play | Temple of the Golden Jaguar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Temple of the Golden Jaguar</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="play.html">Play Game</a>
    <a href="instructions.html">Instructions</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main class="game-container">

  <section class="game-card">
    <div class="scene-image" id="sceneImage">
      Scene Image
    </div>

    <div class="story-box">
      <p id="storyText">Story text will appear here.</p>
    </div>

    <div id="choiceButtons" class="choices"></div>

    <div class="game-controls">
      <p id="inventoryText">Inventory: Empty</p>
      <button id="soundToggle">Sound: On</button>
      <button id="restartBtn">Restart Game</button>
    </div>
  </section>

</main>

<footer>
  <p>Student Project | Web Technologies</p>
</footer>

<script src="js/game.js"></script>
</body>
</html>
